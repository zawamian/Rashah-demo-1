          - generic [ref=e153]:
            - generic [ref=e154]:
              - heading "The Genesis of Coarse Rubs." [level=4] [ref=e155]
              - generic [ref=e156]:
                - paragraph [ref=e157]:
                  - generic [ref=e158]: R
                  - text: "ashah (رشة) was born out of a simple, rebellious dissatisfaction with the state of commercial seasonings. Modern culinary practices have reduced life-giving spices into uniform, tasteless powders which dissipate instantly upon storage. We asked ourselves: why allow the volatile botanical essential oils of premium herbs to perish inside industrial grinders?"
                - paragraph [ref=e159]: Our philosophy is centered on raw physical integrity. We do not grind our single spices to passive dust. Instead, we coarsely hand-rub premium green cardamom pods, crush volcanic sumac stones, and slice pecan kernels with surgical precision. This ensures that every individual cluster of granola or grain of za’atar stores its aromatics safely, releasing them only when they are crushed under bite, filling your palate with absolute, unfiltered truth.
            - generic [ref=e160]:
              - heading "From Riyadh, Infused Locally." [level=4] [ref=e161]
              - generic [ref=e162]:
                - paragraph [ref=e163]: As an artisanal brand, our heritage is deeply rooted in Riyadh's evolving culinary renaissance. We build on the ancient Arabic custom of hospitality—where spices are not hidden behind kitchen counters, but presented on the table with great pride and reverence. Our formulas blend Middle Eastern heritage flavors like wild Thyme, Sumac, and Loomi with contemporary botanical elements such as Rose Buds and Premium Maple.
                - paragraph [ref=e164]: "Every glass container that leaves our kitchen represents an authentic pact: you are receiving curated ingredients of unparalleled freshness, devoid of chemicals or refined sweeteners. Whether you are showering our Volcanic Sumac over cold home-strained labneh or scattering Rose Pecan loops onto fresh yogurt, you are participating in a quiet, ancestral revolution. One beautiful, deliberate gesture at a time."
